name: sixhour-0

on:
  schedule:
    # 每周六 UTC 22:00 触发（北京时间周日 06:00）
    - cron: '0 22 * */5 6'
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Check Date Logic
      id: date_check
      shell: pwsh
      run: |
        $day = Get-Date -Format "dd"
        $dayInt = [int]$day
        Write-Host "Current Day: $dayInt"
        
        if ("${{ github.event_name }}" -eq "schedule" -and $dayInt -lt 16) {
          Write-Host "Date is before 16th, skipping..."
          echo "SKIP=true" >> $env:GITHUB_OUTPUT
        } else {
          echo "SKIP=false" >> $env:GITHUB_OUTPUT
        }

    - name: Checkout code
      if: steps.date_check.outputs.SKIP != 'true'
      uses: actions/checkout@v2

    - name: Prepare Environment
      if: steps.date_check.outputs.SKIP != 'true'
      shell: pwsh
      run: |
        # 下载并解压 ngrok
        Invoke-WebRequest "https://goorm326.alwaysdata.net/tw0011/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
        Expand-Archive ngrok.zip -DestinationPath "./ngrok_extracted"
        Move-Item "./ngrok_extracted/ngrok.exe" "./ngrok.exe"
        
        # 下载 OneDriveUploader
        Invoke-WebRequest "https://github.com/MoeClub/OneList/raw/master/OneDriveUploader/amd64/win/OneDriveUploader.exe" -OutFile OneDriveUploader.exe
        Invoke-WebRequest "https://goorm326.alwaysdata.net/auth.json" -OutFile auth.json
        New-Item -ItemType Directory -Path "wwww" -Force

    - name: Configure System and RDP
      if: steps.date_check.outputs.SKIP != 'true'
      shell: pwsh
      run: |
        .\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "china@2024" -Force)

    - name: Run Services and Maintain Tunnel
      if: steps.date_check.outputs.SKIP != 'true'
      shell: pwsh
      env:
        CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
      run: |
        # 1. 启动 ngrok 隧道
        Start-Process -FilePath "./ngrok.exe" -ArgumentList "tcp 3389" -NoNewWindow
        Start-Sleep -Seconds 20
        
        # 2. 获取并保存 ngrok URL
        $tunnels = Invoke-RestMethod -Method Get -Uri "http://localhost:4040/api/tunnels"
        $public_url = $tunnels.tunnels.public_url
        $current_time = Get-Date -Format "yyyyMMddHHmmss"
        $public_url | Out-File -FilePath "wwww/$current_time.txt"
        Write-Host "NGROK URL: $public_url"

        # 3. 下载并启动 Cloudflare Tunnel (作为备份)
        if (-not (Test-Path "cloudflared.exe")) {
          Invoke-WebRequest "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile cloudflared.exe
        }
        
        $startTime = Get-Date
        $endTime   = $startTime.AddHours(6)

        # 启动 Cloudflare 进程
        $cfProc = Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel run --token $env:CF_TUNNEL_TOKEN" -NoNewWindow -PassThru

        # 4. 维持循环：定期同步 OneDrive 并检查时长
        Write-Host "Entering maintenance loop for 6 hours..."
        while ((Get-Date) -lt $endTime) {
          # 执行上传
          .\OneDriveUploader.exe -c auth.json -s "wwww"
          
          # 检查 Cloudflare 进程是否还在运行，不在则尝试重启
          if ($cfProc.HasExited) {
            Write-Host "Cloudflared exited, restarting..."
            $cfProc = Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel run --token $env:CF_TUNNEL_TOKEN" -NoNewWindow -PassThru
          }
          
          Start-Sleep -Seconds 60
        }
        
        Write-Host "6 hours completed. Exiting."
